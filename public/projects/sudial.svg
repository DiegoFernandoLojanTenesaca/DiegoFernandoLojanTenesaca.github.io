<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="0" y2="450" stroke="#fff" stroke-width="1" transform="translate(100,0)"/>
    <line x1="0" y1="0" x2="0" y2="450" stroke="#fff" stroke-width="1" transform="translate(200,0)"/>
    <line x1="0" y1="0" x2="0" y2="450" stroke="#fff" stroke-width="1" transform="translate(300,0)"/>
    <line x1="0" y1="0" x2="0" y2="450" stroke="#fff" stroke-width="1" transform="translate(400,0)"/>
    <line x1="0" y1="0" x2="0" y2="450" stroke="#fff" stroke-width="1" transform="translate(500,0)"/>
    <line x1="0" y1="0" x2="0" y2="450" stroke="#fff" stroke-width="1" transform="translate(600,0)"/>
    <line x1="0" y1="0" x2="0" y2="450" stroke="#fff" stroke-width="1" transform="translate(700,0)"/>
  </g>

  <!-- Sidebar mockup -->
  <rect x="40" y="60" width="160" height="330" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <circle cx="120" cy="95" r="18" fill="url(#accent)" opacity="0.3"/>
  <rect x="60" y="125" width="120" height="8" rx="4" fill="#334155"/>
  <rect x="60" y="145" width="90" height="6" rx="3" fill="#334155" opacity="0.6"/>
  <rect x="60" y="170" width="120" height="8" rx="4" fill="url(#accent)" opacity="0.4"/>
  <rect x="60" y="195" width="100" height="6" rx="3" fill="#334155" opacity="0.5"/>
  <rect x="60" y="215" width="110" height="6" rx="3" fill="#334155" opacity="0.5"/>
  <rect x="60" y="235" width="95" height="6" rx="3" fill="#334155" opacity="0.5"/>
  <rect x="60" y="255" width="105" height="6" rx="3" fill="#334155" opacity="0.5"/>
  <rect x="60" y="280" width="120" height="8" rx="4" fill="#334155"/>
  <rect x="60" y="305" width="80" height="6" rx="3" fill="#334155" opacity="0.5"/>
  <rect x="60" y="325" width="100" height="6" rx="3" fill="#334155" opacity="0.5"/>

  <!-- Main content area -->
  <rect x="220" y="60" width="540" height="330" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <!-- Top bar -->
  <rect x="220" y="60" width="540" height="40" rx="8" fill="#1e293b"/>
  <rect x="220" y="92" width="540" height="1" fill="#334155"/>
  <circle cx="245" cy="80" r="5" fill="#ef4444" opacity="0.6"/>
  <circle cx="263" cy="80" r="5" fill="#eab308" opacity="0.6"/>
  <circle cx="281" cy="80" r="5" fill="#22c55e" opacity="0.6"/>
  <rect x="320" y="74" width="200" height="12" rx="6" fill="#0f172a"/>

  <!-- Chat mockup - WhatsApp style -->
  <!-- Left messages -->
  <rect x="245" y="115" width="200" height="35" rx="10" fill="#1a3a2a"/>
  <rect x="260" y="125" width="140" height="6" rx="3" fill="#22c55e" opacity="0.3"/>
  <rect x="260" y="135" width="100" height="5" rx="2.5" fill="#22c55e" opacity="0.2"/>

  <rect x="245" y="160" width="170" height="28" rx="10" fill="#1a3a2a"/>
  <rect x="260" y="170" width="120" height="6" rx="3" fill="#22c55e" opacity="0.3"/>

  <!-- Right messages -->
  <rect x="500" y="198" width="230" height="35" rx="10" fill="#1e3a5f"/>
  <rect x="515" y="208" width="160" height="6" rx="3" fill="#3b82f6" opacity="0.3"/>
  <rect x="515" y="218" width="120" height="5" rx="2.5" fill="#3b82f6" opacity="0.2"/>

  <rect x="530" y="243" width="200" height="28" rx="10" fill="#1e3a5f"/>
  <rect x="545" y="253" width="140" height="6" rx="3" fill="#3b82f6" opacity="0.3"/>

  <!-- Left message -->
  <rect x="245" y="281" width="220" height="28" rx="10" fill="#1a3a2a"/>
  <rect x="260" y="291" width="160" height="6" rx="3" fill="#22c55e" opacity="0.3"/>

  <!-- Input bar -->
  <rect x="240" y="340" width="500" height="35" rx="17" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="260" y="354" width="100" height="6" rx="3" fill="#475569" opacity="0.4"/>
  <circle cx="715" cy="357" r="14" fill="url(#accent)" opacity="0.5"/>

  <!-- Floating metrics -->
  <rect x="570" y="110" width="170" height="65" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="1" opacity="0.8"/>
  <text x="585" y="132" fill="#94a3b8" font-family="monospace" font-size="10">190+ components</text>
  <text x="585" y="148" fill="#94a3b8" font-family="monospace" font-size="10">90+ endpoints</text>
  <text x="585" y="164" fill="#94a3b8" font-family="monospace" font-size="10">80+ DB models</text>

  <!-- Title -->
  <text x="400" y="425" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle" letter-spacing="2" opacity="0.5">SUDIAL — SaaS Platform</text>
</svg>
